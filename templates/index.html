{% extends "base.html" %}

{% block title %}Загрузка файла{% endblock %}

{% block styles %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div style="max-width: 460px; width: 100%;">

        <!-- Icon -->
        <div class="text-center mb-4">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="4" fill="#1a1a1a"/>
                <path d="M17 17a9.9 9.9 0 0 0 0 14" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" fill="none"/>
                <path d="M31 17a9.9 9.9 0 0 1 0 14" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" fill="none"/>
                <path d="M12 12a17 17 0 0 0 0 24" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 2" fill="none" opacity=".35"/>
                <path d="M36 12a17 17 0 0 1 0 24" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 2" fill="none" opacity=".35"/>
            </svg>
        </div>

        <h1 class="text-center fw-bold mb-1" style="font-size:24px;">Загрузка файла</h1>
        <p class="text-center text-secondary mb-4" style="font-size:14px;">
            Загрузите файл сигнала в формате <span class="mono">.npz</span>
        </p>

        <div class="upload-card p-4">


            <form class="send" method="post" enctype="multipart/form-data" id="uploadForm">

                <div class="mb-3">
                    <label for="npzFile" class="form-label text-secondary" style="font-size:13px;">Выберите файл</label>
                    <input type="file"
                           accept=".npz"
                           name="file"
                           id="npzFile"
                           class="form-control"
                           required/>
                    <div class="form-text mono" style="font-size:11px;">Поддерживается только формат .npz</div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-dark w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/>
                    </svg>
                    Отправить
                </button>

            </form>

        </div>


    </div>
</div>
{% endblock %}
